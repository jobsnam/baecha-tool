<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배차일보 절개 도구</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    /* 드롭존 */
    .dropzone {
      border: 2px dashed #ccd;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafafa;
      margin-bottom: 24px;
    }
    .dropzone.drag-over { border-color: #4f7fff; background: #eef2ff; }
    .dropzone svg { margin-bottom: 10px; }
    .dropzone p { color: #666; font-size: 14px; }
    .dropzone span { color: #4f7fff; font-weight: 600; cursor: pointer; }
    #file-input { display: none; }

    /* 파일 목록 */
    #file-list {
      list-style: none;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #file-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f7ff;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: #333;
    }
    #file-list li .icon { font-size: 16px; }
    #file-list li .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-list li .remove {
      cursor: pointer; color: #bbb; font-size: 16px; line-height: 1;
      border: none; background: none; padding: 0;
    }
    #file-list li .remove:hover { color: #e55; }

    /* 설정 */
    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    input[type="text"], input[type="number"] {
      width: 100%;
      border: 1.5px solid #dde;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f7fff; }

    /* 버튼 */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #cc0000; color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      background: #fff;
      color: #cc0000;
      border: 2px solid #cc0000;
      margin-top: 10px;
    }
    .btn-secondary:hover { background: #fff5f5; }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-row { display: flex; flex-direction: column; gap: 0; }

    #individual-downloads {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e8e8e8;
    }
    #individual-downloads .dl-hint {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    #individual-downloads .btn-dl {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 12px;
      background: #f8f9fa;
      color: #1a1a2e;
      border: 1px solid #dde;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }
    #individual-downloads .btn-dl:active { background: #eef0f3; }

    /* 상태 */
    #status {
      margin-top: 20px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
    .status-ok   { color: #1a7f37; font-weight: 600; }
    .status-err  { color: #c00;    font-weight: 600; }
    .status-info { color: #555; }

    /* 스피너 */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ccc;
      border-top-color: #cc0000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="card">
  <h1>배차일보 절개 도구</h1>
  <p class="subtitle">이미지를 업로드하면 노선 구역을 자동으로 잘라내고 날짜를 삽입합니다. 4장 이상이면 서버 부담을 줄이기 위해 <strong>3장씩 나눠</strong> 처리한 뒤 ZIP은 한 번에 합쳐 드립니다.</p>

  <!-- 드롭존 -->
  <div class="dropzone" id="dropzone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aab" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>여기에 파일을 드래그하거나 <span id="browse-btn">클릭해서 선택</span>하세요</p>
    <p style="margin-top:6px; font-size:12px; color:#aaa;">PNG / JPG · 여러 장 동시 업로드 가능</p>
    <input type="file" id="file-input" multiple accept=".png,.jpg,.jpeg">
  </div>

  <!-- 파일 목록 -->
  <ul id="file-list"></ul>

  <!-- 설정 -->
  <div class="settings">
    <div>
      <label for="route">노선 번호</label>
      <input type="text" id="route" value="5002" placeholder="예: 5002">
    </div>
    <div>
      <label for="size">글씨 크기</label>
      <input type="number" id="size" value="58" min="20" max="200">
    </div>
  </div>

  <div class="btn-row">
    <button type="button" class="btn btn-primary" id="process-zip" disabled>ZIP으로 받기 (PC 권장)</button>
    <button type="button" class="btn btn-secondary" id="process-separate" disabled>한 장씩 받기 (폰·압축 불편할 때)</button>
  </div>
  <div id="individual-downloads"></div>
  <div id="status"></div>
</div>

<script>
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('file-input');
  const browseBtn  = document.getElementById('browse-btn');
  const fileList   = document.getElementById('file-list');
  const zipBtn     = document.getElementById('process-zip');
  const sepBtn     = document.getElementById('process-separate');
  const indivBox   = document.getElementById('individual-downloads');
  const status     = document.getElementById('status');

  /** 한 요청에 너무 많이 넣으면(특히 OCR) Render 502·시간 제한에 걸릴 수 있어 나눔 */
  const BATCH_SIZE = 3;

  let files = [];

  browseBtn.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('click', (e) => {
    if (e.target !== browseBtn) fileInput.click();
  });

  dropzone.addEventListener('dragover',  (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', ()  => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!files.find(x => x.name === f.name && x.size === f.size)) {
        files.push(f);
      }
    });
    renderList();
  }

  function renderList() {
    fileList.innerHTML = '';
    files.forEach((f, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="icon">🖼</span>
        <span class="name">${f.name}</span>
        <button class="remove" data-i="${i}">✕</button>`;
      fileList.appendChild(li);
    });
    fileList.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', () => {
        files.splice(Number(btn.dataset.i), 1);
        renderList();
      });
    });
    zipBtn.disabled = sepBtn.disabled = files.length === 0;
    status.textContent = '';
    indivBox.style.display = 'none';
    indivBox.innerHTML = '';
  }

  function buildFormData(chunk, route, size, delivery) {
    const fd = new FormData();
    chunk.forEach(f => fd.append('files', f));
    fd.append('route', route);
    fd.append('size', size);
    fd.append('color', 'cc0000');
    fd.append('delivery', delivery);
    return fd;
  }

  function humanHttpError(status, text) {
    if (status === 502 || status === 503 || status === 504) {
      return '서버 연결이 중간에 끊겼습니다(오류 ' + status + '). '
        + '한 번에 많은 장을 처리하면 클라우드 제한에 걸릴 수 있어, 자동으로 나눠 처리합니다. '
        + '페이지를 새로고침한 뒤 다시 시도해 보세요.';
    }
    if (text && /<!DOCTYPE|<html[\s>]/i.test(text)) {
      return '서버 오류(응답 ' + status + '). 잠시 후 다시 시도하거나 장 수를 줄여 보세요.';
    }
    return null;
  }

  function parseErrorMessage(status, text) {
    const friendly = humanHttpError(status, text);
    if (friendly) return friendly;
    let msg = 'HTTP ' + status;
    try {
      const data = JSON.parse(text);
      if (data && data.error) msg = data.error;
      else if (data && typeof data === 'object') msg = JSON.stringify(data);
    } catch {
      const t = (text || '').trim();
      if (t && t.length < 500) msg = t;
      else if (t) msg = t.slice(0, 400) + '…';
    }
    return msg;
  }

  async function runProcess(delivery) {
    if (!files.length) return;

    const route = document.getElementById('route').value.trim() || '5002';
    const size  = document.getElementById('size').value  || '58';
    const total = files.length;

    zipBtn.disabled = sepBtn.disabled = true;
    indivBox.style.display = 'none';
    indivBox.innerHTML = '';
    status.innerHTML = '<span class="spinner"></span><span class="status-info">처리 준비 중…</span>';

    try {
      if (total <= BATCH_SIZE) {
        await runProcessSingle(delivery, files, route, size, total);
      } else if (delivery === 'separate') {
        await runSeparateBatched(route, size, total);
      } else {
        await runZipBatched(route, size, total);
      }
    } catch (e) {
      const m = e instanceof Error ? e.message : String(e);
      status.innerHTML = `<span class="status-err">오류: ${escapeHtml(m)}</span>`;
    } finally {
      zipBtn.disabled = sepBtn.disabled = files.length === 0;
    }
  }

  async function runProcessSingle(delivery, chunk, route, size, totalLabel) {
    status.innerHTML = `<span class="spinner"></span><span class="status-info">처리 중… (${totalLabel}장)</span>`;
    const fd = buildFormData(chunk, route, size, delivery);
    const res = await fetch('/process', { method: 'POST', body: fd });
    const ct = (res.headers.get('content-type') || '').toLowerCase();

    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(parseErrorMessage(res.status, errBody));
    }

    if (delivery === 'separate' && ct.includes('application/json')) {
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      showIndividualDownloads(data.files || [], data.failed || []);
      const n = data.count || (data.files && data.files.length) || 0;
      status.innerHTML = `<span class="status-ok">✓ ${n}개 이미지 준비됨. 아래에서 하나씩 눌러 저장하세요.</span>`;
      return;
    }

    const blob = await res.blob();
    triggerDownloadBlob(blob, `${route}번_배차일보.zip`);
    status.innerHTML = `<span class="status-ok">✓ ${chunk.length}개 처리 완료! ZIP이 다운로드됩니다.</span>`;
  }

  async function runSeparateBatched(route, size, total) {
    const allFiles = [];
    const allFailed = [];
    for (let start = 0; start < total; start += BATCH_SIZE) {
      const chunk = files.slice(start, start + BATCH_SIZE);
      const done = Math.min(start + chunk.length, total);
      status.innerHTML = `<span class="spinner"></span><span class="status-info">처리 중 ${done}/${total} … (나눠서 전송)</span>`;
      const fd = buildFormData(chunk, route, size, 'separate');
      const res = await fetch('/process', { method: 'POST', body: fd });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(parseErrorMessage(res.status, errBody));
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      (data.files || []).forEach(f => allFiles.push(f));
      (data.failed || []).forEach(f => allFailed.push(f));
    }
    showIndividualDownloads(allFiles, allFailed);
    status.innerHTML = `<span class="status-ok">✓ ${allFiles.length}개 이미지 준비됨. 아래에서 하나씩 눌러 저장하세요.</span>`;
    if (allFailed.length) {
      status.innerHTML += `<br><span class="status-err" style="font-size:12px;">건너뜀 ${allFailed.length}건은 아래 목록 참고</span>`;
    }
  }

  async function runZipBatched(route, size, total) {
    if (typeof JSZip === 'undefined') {
      throw new Error('JSZip 로딩 실패—인터넷 연결을 확인하고 새로고침해 주세요.');
    }
    const merged = new JSZip();
    for (let start = 0; start < total; start += BATCH_SIZE) {
      const chunk = files.slice(start, start + BATCH_SIZE);
      const done = Math.min(start + chunk.length, total);
      status.innerHTML = `<span class="spinner"></span><span class="status-info">ZIP 합치는 중 ${done}/${total} …</span>`;
      const fd = buildFormData(chunk, route, size, 'zip');
      const res = await fetch('/process', { method: 'POST', body: fd });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(parseErrorMessage(res.status, errBody));
      }
      const blob = await res.blob();
      const inner = await JSZip.loadAsync(blob);
      for (const name of Object.keys(inner.files)) {
        const entry = inner.files[name];
        if (!entry.dir) {
          merged.file(name, await entry.async('uint8array'));
        }
      }
    }
    const outBlob = await merged.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    triggerDownloadBlob(outBlob, `${route}번_배차일보.zip`);
    status.innerHTML = `<span class="status-ok">✓ ${total}장 모두 처리해 ZIP 한 개로 받습니다.</span>`;
  }

  function triggerDownloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  zipBtn.addEventListener('click', () => runProcess('zip'));
  sepBtn.addEventListener('click', () => runProcess('separate'));

  function showIndividualDownloads(fileList, failed) {
    indivBox.innerHTML = '';
    const hint = document.createElement('p');
    hint.className = 'dl-hint';
    hint.innerHTML = '<strong>폰에서 쓰실 때:</strong> 아래 버튼을 <strong>순서대로 한 번씩</strong> 눌러 저장하세요. ZIP처럼 압축을 풀 필요가 없습니다.';
    indivBox.appendChild(hint);

    (fileList || []).forEach((f, i) => {
      let bytes;
      try {
        const bin = atob(f.data);
        bytes = new Uint8Array(bin.length);
        for (let j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j);
      } catch {
        return;
      }
      const blob = new Blob([bytes], { type: 'image/png' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = f.filename || `image_${i + 1}.png`;
      a.className = 'btn-dl';
      a.textContent = `${i + 1}. ${a.download}`;
      a.addEventListener('click', () => {
        setTimeout(() => URL.revokeObjectURL(url), 3000);
      });
      indivBox.appendChild(a);
    });

    if (failed && failed.length) {
      const p = document.createElement('p');
      p.className = 'status-err';
      p.style.marginTop = '12px';
      p.style.textAlign = 'left';
      p.textContent = '건너뜀: ' + failed.join(' · ');
      indivBox.appendChild(p);
    }

    indivBox.style.display = 'block';
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
